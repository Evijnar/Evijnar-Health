name: Coverage

on:
  push:
    branches: ["main"]

jobs:
  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e .
          pip install pytest-cov

      - name: Download coverage from ci-full artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        continue-on-error: true

      - name: Generate coverage badge
        run: |
          pip install coverage-badge
          coverage-badge -o htmlcov/coverage.svg -f -q 2>/dev/null || true

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          verbose: true

      - name: Comment on related PRs
        uses: actions/github-script@v6
        if: always()
        with:
          script: |
            const fs = require('fs');
            const coverage_path = 'apps/api/htmlcov/index.html';

            if (fs.existsSync(coverage_path)) {
              const content = fs.readFileSync(coverage_path, 'utf8');
              const match = content.match(/data-total-coverage="(\d+(\.\d+)?)"/);

              if (match) {
                const coverage = match[1];
                console.log(`Coverage: ${coverage}%`);
              }
            }
