version: '3.9'

# SECURITY NOTE: This is a DEVELOPMENT-ONLY docker-compose file.
# For production deployments, use environment variables for ALL secrets.
# Never commit sensitive data. Load from .env.local (in .gitignore)

services:
  # PostgreSQL Database (Primary)
  postgres:
    image: postgres:16-alpine
    container_name: evijnar_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-evijnar_dev}
      POSTGRES_USER: ${DB_USER:-evijnar_dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-in-development}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evijnar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evijnar_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Caching & Session Store)
  redis:
    image: redis:7-alpine
    container_name: evijnar_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - evijnar_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: evijnar_api
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=postgresql://${DB_USER:-evijnar_dev}:${DB_PASSWORD:-change-in-dev}@postgres:5432/${DB_NAME:-evijnar_dev}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - JWT_SECRET=${JWT_SECRET:-change-this-jwt-secret}
      - ENCRYPTION_KEY_PATIENT_DATA=${ENCRYPTION_KEY_PATIENT_DATA:-}
      - ENCRYPTION_KEY_PHARMA_DATA=${ENCRYPTION_KEY_PHARMA_DATA:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HIPAA_AUDIT_LOG_ENABLED=${HIPAA_AUDIT_LOG_ENABLED:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    networks:
      - evijnar_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python run.py

  # Next.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: evijnar_web
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - evijnar_network
    depends_on:
      - api

networks:
  evijnar_network:
    driver: bridge

volumes:
  postgres_data:
